# Ping Supabase setiap 5 hari supaya project free-tier tidak auto-pause.
# Supabase pauses free-tier projects after 7 days of inactivity.
#
# SETUP: Tambahkan 2 Repository Secrets di GitHub (Settings > Secrets > Actions):
#   SUPABASE_URL       → Project URL dari Supabase (cth: https://xxx.supabase.co)
#   SUPABASE_ANON_KEY  → anon public key dari Supabase

name: Keep Supabase Alive

on:
  schedule:
    # Jalan setiap 5 hari jam 04:00 UTC (11:00 WIB)
    - cron: '0 4 */5 * *'
  workflow_dispatch: # Bisa di-trigger manual dari GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          # Mendukung nama secret SUPABASE_URL maupun VITE_SUPABASE_URL
          RAW_URL="${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}"
          RAW_KEY="${{ secrets.SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}"

          if [ -z "$RAW_URL" ]; then
            echo "❌ ERROR: Secret SUPABASE_URL (atau VITE_SUPABASE_URL) masih kosong/belum terbaca!"
            exit 1
          fi

          # Bersihkan URL & pastikan berawalan https://
          URL=$(echo "$RAW_URL" | tr -d '"'\'' ' | sed 's#/$##')
          URL="${URL#http://}"
          URL="${URL#https://}"
          URL="https://$URL"

          KEY=$(echo "$RAW_KEY" | tr -d '"'\'' ')

          echo "Pinging host: $URL ..."

          # 1. Ping Auth Health Endpoint
          STATUS_AUTH=$(curl -s -o /dev/null -w "%{http_code}" "$URL/auth/v1/health")
          echo "Auth health check status: $STATUS_AUTH"

          # 2. Ping REST API Root
          STATUS_REST=$(curl -s -o /dev/null -w "%{http_code}" \
            "$URL/rest/v1/" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY")
          echo "REST API root check status: $STATUS_REST"

          if [ "$STATUS_AUTH" -ge 200 ] && [ "$STATUS_AUTH" -lt 400 ]; then
            echo "✅ Supabase Auth service merespons normal ($STATUS_AUTH). Project aktif!"
          elif [ "$STATUS_REST" -ge 200 ] && [ "$STATUS_REST" -lt 400 ]; then
            echo "✅ Supabase REST service merespons normal ($STATUS_REST). Project aktif!"
          else
            echo "❌ Gagal menghubungi Supabase (Auth: $STATUS_AUTH, REST: $STATUS_REST)."
            echo "Pastikan Secret SUPABASE_URL dan SUPABASE_ANON_KEY di GitHub Settings > Secrets sudah benar."
            exit 1
          fi
