# Ping Supabase setiap 5 hari supaya project free-tier tidak auto-pause.
# Supabase pauses free-tier projects after 7 days of inactivity.
#
# SETUP: Tambahkan 2 Repository Secrets di GitHub (Settings > Secrets > Actions):
#   SUPABASE_URL       → Project URL dari Supabase (cth: https://xxx.supabase.co)
#   SUPABASE_ANON_KEY  → anon public key dari Supabase

name: Keep Supabase Alive

on:
  schedule:
    # Jalan setiap 5 hari jam 04:00 UTC (11:00 WIB)
    - cron: '0 4 */5 * *'
  workflow_dispatch: # Bisa di-trigger manual dari GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          # Bersihkan URL & Key dari kemungkinan spasi/kutip saat copas
          URL=$(echo "${{ secrets.SUPABASE_URL }}" | tr -d '"'\'' ' | sed 's#/$##')
          KEY=$(echo "${{ secrets.SUPABASE_ANON_KEY }}" | tr -d '"'\'' ')

          # 1. Ping Auth Health Endpoint (selalu 200 OK & menjaga instance aktif)
          STATUS_AUTH=$(curl -s -o /dev/null -w "%{http_code}" "$URL/auth/v1/health")
          echo "Auth health status: $STATUS_AUTH"

          # 2. Ping REST API Root
          STATUS_REST=$(curl -s -o /dev/null -w "%{http_code}" \
            "$URL/rest/v1/" \
            -H "apikey: $KEY" \
            -H "Authorization: Bearer $KEY")
          echo "REST API status: $STATUS_REST"

          if [ "$STATUS_AUTH" -ge 200 ] && [ "$STATUS_AUTH" -lt 300 ]; then
            echo "✅ Supabase Auth is alive!"
          elif [ "$STATUS_REST" -ge 200 ] && [ "$STATUS_REST" -lt 300 ]; then
            echo "✅ Supabase REST is alive!"
          else
            echo "⚠️ Unexpected status (Auth: $STATUS_AUTH, REST: $STATUS_REST)"
            exit 1
          fi
